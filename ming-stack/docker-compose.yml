# =========================================================================
# [ MING STACK WITH LAN ZIGBEE COORDINATOR - ARCHITECTURE RELATIONSHIP ]
# =========================================================================
#
#   +----------------------+
#   | SLZB-06p7U (LAN)     |  <-- Zigbee Coordinator (Hardware Antenna)
#   +----------+-----------+
#              |
#              | (LAN / tcp://IP:6638)
#              v
#   +----------------------+
#   | m_zigbee2mqtt        |  <-- [PUBLISHER] Translates Zigbee to JSON
#   +----------+-----------+
#              |
#              | 1. Publish (MQTT:1883)
#              v
#   +----------------------+
#   | m_mosquitto          |  <-- [MQTT BROKER] Central Message Hub
#   +----------+-----------+
#              |
#              | 2. Subscribe (MQTT:1883)
#              v
#   +----------------------+
#   | m_nodered            |  <-- [SUBSCRIBER] Data Processing & Automation
#   +----------+-----------+
#              |
#              | 3. Write Data (Influx API:8086)
#              v
#   +----------------------+
#   | m_influxdb           |  <-- [DATABASE] Time-Series DB
#   +----------+-----------+
#              ^
#              | 4. Query Data (Flux/InfluxQL:8086)
#   +----------+-----------+
#   | m_grafana            |  <-- [VISUALIZATION] Dashboard UI
#   +----------------------+
#
# =========================================================================
# [ CONTAINER ACCESS PORTS FROM MACBOOK BROWSER ]
# - Zigbee2MQTT Dashboard : http://192.168.0.87:8080
# - Node-RED Workspace   : http://192.168.0.87:1880
# - InfluxDB Admin UI     : http://192.168.0.87:8086
# - Grafana Dashboard     : http://192.168.0.87:3000
# =========================================================================

services:
  # 1. Zigbee2MQTT (Zigbee Gateway)
  zigbee2mqtt:
    container_name: m_zigbee2mqtt
    image: ghcr.io/koenkk/zigbee2mqtt:latest
    restart: always
    volumes:
      - ./zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    ports:
      - 8080:8080
    environment:
      - TZ=Asia/Seoul

  # 2. Mosquitto (MQTT Broker)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: m_mosquitto
    restart: unless-stopped
    ports:
      - "${HOST_MQTT_PORT}:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  # 3. Node-RED (Logic & Automation)
  nodered:
    image: nodered/node-red:latest
    container_name: m_nodered
    restart: unless-stopped
    user: "${NAS_UID}:${NAS_GID}"
    ports:
      - "${HOST_NODERED_PORT}:1880"
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./node-red/data:/data
    depends_on:
      - mosquitto
      - influxdb

  # 4. InfluxDB (Time Series Database)
  influxdb:
    image: influxdb:2.7
    container_name: m_influxdb
    restart: unless-stopped
    ports:
      - 8086:8086
    environment:
      - INFLUXDB_ADMIN_USER=${INFLUX_USER}
      - INFLUXD_PASSWORD_FILE=/run/secrets/db_password
      - INFLUXDB_ADMIN_ORG=${INFLUX_ORG}
      - INFLUXDB_ADMIN_BUCKET=${INFLUX_BUCKET}
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2

  # 5. Grafana (Visualization Dashboard)
  grafana:
    image: grafana/grafana-oss:latest
    container_name: m_grafana
    restart: unless-stopped
    user: "${NAS_UID}:${NAS_GID}"
    ports:
      - "${HOST_GRAFANA_PORT}:3000"
    environment:
      - TZ=Asia/Seoul
    volumes:
      - ./grafana/data:/var/lib/grafana
    depends_on:
      - influxdb


secrets:
  db_password:
    file: /dev/shm/.tmp_influx_pw
